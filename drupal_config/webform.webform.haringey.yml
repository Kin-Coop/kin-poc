    organising:
      '#type': processed_text
      '#text': '<div style="background-color:#ffffff;border-radius:8px;color:#ffffff;padding:24px;"><h4><span style="color:#000000;">Working together</span></h4><p>Food co-ops are built by their members, and succeed only through the time, effort, care, and skill that those members contribute as a group.&nbsp;</p><p>There are many ways to get involved, including:</p><ul><li data-list-item-id="e7c59528542ef7fd3cb22232567891253">doorknocking in your local postcode</li><li data-list-item-id="e3da715d7da5f453c19d27fa4cff9f529">making phonecalls&nbsp;</li><li data-list-item-id="e7f5421a99f0cda0f80ff3a2ec00e8098">translating</li><li data-list-item-id="e18fa67daf1db26b94ce878be6d4f7df6">helping with events</li><li data-list-item-id="e4f2b4394d26ca86e54a1ffb72719c2b6">hosting events</li><li data-list-item-id="eea29549dea9b2535034a791a87b90421">driving</li><li data-list-item-id="eb38b07245fed370e53615198c8f69419">coordination / admin</li></ul></div>'
