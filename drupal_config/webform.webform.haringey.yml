    cooperation_fund:
      '#type': processed_text
      '#text': '<div style="background-color:#ffffff;border-radius:8px;color:#ffffff;padding:24px;"><h4><span style="color:#000000;">Growing cooperation in Haringey&nbsp;</span></h4><p>Food co-ops can work together with local growers and community spaces to distribute food and create more benefit. They can also lead to new cooperative initiatives including community solar power groups, tool libraries, resident-run nurseries and new worker-owned businesses!</p><p>Ambitious projects often require money to get started. To make this possible, we are creating a residents’ <strong style="color:#cc0000;">Haringey Cooperation Fund</strong>.&nbsp;</p><p>Participation is voluntary and works like this:</p><ol><li data-list-item-id="e2e816b12fdf2c8bb50eacf23ebabd024">Members give <strong style="color:#cc0000;">£1 per week </strong>(minimum)</li><li data-list-item-id="e7faf7672955edfcf390f28d6fd8e81ff">Residents propose new cooperative projects that will benefit the borough</li><li data-list-item-id="eb7391dc9f754f5a814ea8bfde0db4768">Fund members meet to decide on the proposals: each fund contributor has one vote&nbsp;</li></ol></div>'
      '#format': full_html
