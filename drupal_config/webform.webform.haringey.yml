    food_coops:
      '#type': processed_text
      '#text': '<div style="background-color:#ffffff;border-radius:8px;color:#ffffff;padding:24px;"><h4><span style="color:#000000;">Introduction&nbsp;</span></h4><p>We are a group of Haringey residents whose aim is <strong style="color:#cc0000;">to organise the people of Haringey into neighbourhood food cooperatives</strong>.</p><p>Food cooperatives are informal groups who buy regular food items in bulk to save money. Buying wholesale can create <strong style="color:#cc0000;">savings of up to 40%</strong> compared to the supermarket, especially on vegetables and loose staples like rice and oil.&nbsp;</p><p dir="ltr">Food co-ops are also a great way to <strong style="color:#cc0000;">connect</strong> with other local people which can lead to more exciting forms of <strong style="color:#cc0000;">cooperation in Haringey,</strong> including everything from mutual family support to worker-owned businesses.</p></div>'
      '#format': full_html
