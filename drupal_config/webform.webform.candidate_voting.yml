      '#readonly': true
      '#counter_type': character
      '#counter_maximum': 255
      '#counter_maximum_message': ' '
      '#default_value': 'Dr Balgiisa Sheik Ahmed'
      '#data_type': String
      '#form_key': civicrm_4_activity_1_cg32_custom_87
      '#extra':
        width: 20
      '#parent': civicrm_4_activity_1_fieldset_fieldset
    background_4:
      '#type': textarea
      '#title': 'Background '
      '#readonly': true
      '#default_value': 'Dr Balgiisa Sheik Ahmed is a legal academic and activist. She was part of the founding team of Kin Co-operative, a platform cooperative building tools for community savings and mutual aid, and continues to support its development in an advisory capacity. She is an Assistant Professor of Law, her work focuses on labour law, workers’ rights, and international law. Her teaching and research reflects a commitment to economic justice and community organising. '
    civicrm_4_activity_1_cg32_custom_88:
      '#type': civicrm_options
      '#extra':
        aslist: 0
        items: |-
          for|For
          against|Against
          abstain|Abstain
      '#data_type': String
      '#form_key': civicrm_4_activity_1_cg32_custom_88
      '#options':
        for: For
        against: Against
        abstain: Abstain
      '#parent': civicrm_4_activity_1_fieldset_fieldset
      '#title': Vote
      '#civicrm_live_options': 1
      '#required': true
