id: candidate_voting
title: 'Candidate Voting'
description: ''
categories: {  }
elements: |-
  processed_text:
    '#type': processed_text
    '#text': "<p>Below are all of the nominees for Kin's Board of Directors. Please cast one vote for EACH candidate. Only members can vote.<br><br>Note: This vote is not exclusive: you can vote for all candidates and the Board MUST have a minimum of 3 directors.</p>"
    '#format': basic_html
  civicrm_1_contact_1_contact_existing:
    '#type': civicrm_contact
    '#title': 'Voting Member'
    '#disabled': true
    '#widget': hidden
    '#none_prompt': '+ Create new +'
    '#show_hidden_contact': 1
    '#results_display':
      display_name: display_name
    '#required': true
    '#hide_method': disable
    '#submit_disabled': true
    '#default': user
    '#check_permissions': 0
    '#allow_create': 1
    '#contact_type': individual
    '#form_key': civicrm_1_contact_1_contact_existing
    '#parent': civicrm_1_contact_1_fieldset_fieldset
    '#extra': {  }
  civicrm_1_activity_1_fieldset_fieldset:
    '#type': fieldset
    '#title': 'Nominee 1'
    '#form_key': civicrm_1_activity_1_fieldset_fieldset
    civicrm_1_activity_1_activity_subject:
      '#type': textfield
      '#title': 'Activity Subject'
      '#default_value': 'AGM Vote'
      '#access': false
      '#form_key': civicrm_1_activity_1_activity_subject
      '#extra':
        width: 20
      '#parent': civicrm_1_activity_1_fieldset_fieldset
    civicrm_1_activity_1_cg32_custom_87:
      '#type': textfield
      '#title': 'Candidate Name'
      '#readonly': true
      '#counter_type': character
      '#counter_maximum': 255
      '#counter_maximum_message': ' '
      '#default_value': 'Sarah Stein Lubrano'
      '#data_type': String
      '#form_key': civicrm_1_activity_1_cg32_custom_87
      '#extra':
        width: 20
      '#parent': civicrm_1_activity_1_fieldset_fieldset
    nominee_background:
      '#type': textarea
      '#title': 'Background '
      '#readonly': true
      '#default_value': 'Sarah is a feminist mutual aid organiser and food cooperative organiser. She helps run a Cooperation Town food coop as well as mutual aid for the Caledonian and Barnsbury wards. She writes books on political and community organising and has previously worked teaching in prisons. She’s committed to living in London and serving her neighbours. She has previously helped publicise Kin. '
    civicrm_1_activity_1_cg32_custom_88:
      '#type': civicrm_options
      '#extra':
        aslist: 0
        items: |-
          for|For
          against|Against
          abstain|Abstain
      '#data_type': String
      '#form_key': civicrm_1_activity_1_cg32_custom_88
      '#options':
        for: For
        against: Against
        abstain: Abstain
      '#parent': civicrm_1_activity_1_fieldset_fieldset
      '#title': Vote
      '#civicrm_live_options': 1
      '#required': true
  civicrm_2_activity_1_fieldset_fieldset:
    '#type': fieldset
    '#title': 'Nominee 2'
    '#form_key': civicrm_2_activity_1_fieldset_fieldset
    civicrm_2_activity_1_activity_subject:
      '#type': textfield
      '#title': 'Activity Subject'
      '#default_value': 'AGM Vote'
      '#access': false
      '#form_key': civicrm_2_activity_1_activity_subject
      '#extra':
        width: 20
      '#parent': civicrm_2_activity_1_fieldset_fieldset
    civicrm_2_activity_1_cg32_custom_87:
      '#type': textfield
      '#title': 'Candidate Name'
      '#readonly': true
      '#counter_type': character
      '#counter_maximum': 255
      '#counter_maximum_message': ' '
      '#default_value': 'Rob Callender'
      '#data_type': String
      '#form_key': civicrm_2_activity_1_cg32_custom_87
      '#extra':
        width: 20
      '#parent': civicrm_2_activity_1_fieldset_fieldset
    background:
      '#type': textarea
      '#title': 'Background '
      '#readonly': true
      '#default_value': 'Rob is a founder of Kin and was a driving force behind the creation of our bespoke non-profit cooperative legal model and has worked with Ben to help build the platform and adapt Kin to new communities. He has served as cooperative secretary since Kin’s founding and is committed to the mission of creating a community-led economic system and making Kin sustainable. He is based in London, is part of the LGBTQ+ community, and is completing a Masters degree this year at Mondragon University in Cooperative Business. '
    civicrm_2_activity_1_cg32_custom_88:
      '#type': civicrm_options
      '#extra':
        aslist: 0
        items: |-
          for|For
          against|Against
          abstain|Abstain
      '#data_type': String
      '#form_key': civicrm_2_activity_1_cg32_custom_88
      '#options':
        for: For
        against: Against
        abstain: Abstain
      '#parent': civicrm_2_activity_1_fieldset_fieldset
      '#title': Vote
      '#civicrm_live_options': 1
      '#required': true
  civicrm_3_activity_1_fieldset_fieldset:
    '#type': fieldset
    '#title': 'Nominee 3'
    civicrm_3_activity_1_activity_subject:
      '#type': textfield
      '#title': 'Activity Subject'
      '#access': false
      '#form_key': civicrm_3_activity_1_activity_subject
      '#extra':
        width: 20
      '#parent': civicrm_3_activity_1_fieldset_fieldset
    civicrm_3_activity_1_cg32_custom_87:
      '#type': textfield
      '#title': 'Candidate Name'
      '#readonly': true
      '#counter_type': character
      '#counter_maximum': 255
      '#counter_maximum_message': ' '
      '#default_value': 'Ben Mango'
      '#data_type': String
      '#form_key': civicrm_3_activity_1_cg32_custom_87
      '#extra':
        width: 20
      '#parent': civicrm_3_activity_1_fieldset_fieldset
    background_3:
      '#type': textarea
      '#title': 'Background '
      '#readonly': true
      '#default_value': "Ben Mango has been working as a freelance website builder since 2006. In that time, he has worked primarily using open source software and for non-profit clients, particularly in the charity sector. Ben has been involved with Kin since its inception, inspired by Rob's vision. Ben initially worked as a volunteer and progressed to doing freelance paid work before being taken on as a part time member of staff. As well as website development Ben has experience in database management. Ben has also previously been a director with two companies, Tree of Silence Ltd and Just Skate Ltd."
    civicrm_3_activity_1_cg32_custom_88:
      '#type': civicrm_options
      '#extra':
        aslist: 0
        items: |-
          for|For
          against|Against
          abstain|Abstain
      '#data_type': String
      '#form_key': civicrm_3_activity_1_cg32_custom_88
      '#options':
        for: For
        against: Against
        abstain: Abstain
      '#parent': civicrm_3_activity_1_fieldset_fieldset
      '#title': Vote
      '#civicrm_live_options': 1
      '#required': true
  processed_text_02:
    '#type': processed_text
    '#text': '<p>Independent Non-Executive Appointed Directors are selected to bring specific expertise to the Board.</p>'
    '#format': basic_html
  civicrm_4_activity_1_fieldset_fieldset:
    '#type': fieldset
    '#title': 'Independent Non-Executive Appointed Director '
    civicrm_4_activity_1_activity_subject:
