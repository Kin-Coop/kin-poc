  prize_draw:
    '#type': webform_message
    '#message_message': '<p><strong>Fill in this survey for two chances to win £100!</strong></p><p>The prize draw will choose two random respondents if at least 100 responses are received by May 31st. Respondents must answer honestly, be contactable, and live in the London Borough of Haringey.&nbsp;</p>'
