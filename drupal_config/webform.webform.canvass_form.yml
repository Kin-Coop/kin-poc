      intercooperation:
        '#type': webform_message
        '#message_type': info
        '#message_message': '<p>Cooperation means communities working together. It means wealth created locally stays local, leading to better common spaces, services and culture.&nbsp;</p><p>Cooperation starts with building local communities and not waiting for others to do it.&nbsp;</p>'
        '#message_close': true
