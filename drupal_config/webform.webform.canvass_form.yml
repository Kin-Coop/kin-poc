      '#title_display': invisible
      '#form_key': civicrm_1_contact_1_cg33_fieldset
      food_cooperatives:
        '#type': webform_section
        '#title': 'Food Cooperatives'
      food_coop_info:
        '#type': webform_message
        '#message_type': info
        '#message_message': '<p><strong>Food cooperatives </strong>are groups of neighbours who buy regular food items in bulk to save money.&nbsp;</p><p>Buying wholesale can create savings of up to 40% compared to the supermarket, especially on vegetables and loose staples like rice and oil.&nbsp;</p><p>They are simple to run, there is a local organisation that can help you get started, and most groups spend £2-6 per person per order.&nbsp;</p><p>For more information about food coops, visit <a href="https://cooperation.town">https://cooperation.town</a></p>'
        '#message_close': true
      civicrm_1_contact_1_cg33_custom_94:
        '#type': civicrm_options
        '#title': 'Would you be interested in joining a food cooperative with your neighbours?'
        '#options':
          2: 'Yes'
          4: Maybe
          3: 'No'
        '#required': true
        '#data_type': String
        '#civicrm_condition':
          andor: or
          action: visible
          rules:
            contact_contact_sub_type:
              values:
                - Canvass_Contact
        '#form_key': civicrm_1_contact_1_cg33_custom_94
        '#parent': civicrm_1_contact_1_cg33_fieldset
        '#default_option': ''
        '#default_value': ''
        '#civicrm_live_options': '1'
      savings_clubs:
        '#type': webform_section
        '#title': 'Savings Clubs'
      savings_club_info:
        '#type': webform_message
        '#message_type': info
        '#message_message': '<p><strong>Savings clubs </strong>are used by communities all over the world. You might know them by another name like pardna, sousou or hagbad.&nbsp;</p><p>There are different kinds:&nbsp;</p><ol><li data-list-item-id="eac4bf8518e4fc07cd5f90739b3d0d2e5">Rotating fund - close neighbours or trusted group save an agreed amount every month; every month one person gets the whole fund. Repeats until all have received.&nbsp;</li><li data-list-item-id="e51b62ef5752cd5359169deed64937596">Community purchase - the group saves together to buy something they will all use (like food, community improvements).&nbsp;</li><li data-list-item-id="e13f0271d0d8275c0cab48fc3b4294196">Solidarity fund - everyone puts in a small amount, e.g. £1 per week; anyone in the group can ask for funds, the group decides the rules together.&nbsp;</li></ol><p>Like food cooperatives, savings clubs are easy to run, they benefit members and the wider community, and there is local support to get started. Many savings clubs start with small amounts and increase as the trust between members grows.</p><p>Find out more about savings clubs at: <a href="https://kin.coop/faqs/common-kinds-savings-club">https://kin.coop/faqs/common-kinds-savings-club</a>&nbsp;</p>'
        '#message_close': true
      civicrm_1_contact_1_cg33_custom_111:
        '#type': civicrm_options
        '#title': 'Would you be interested in joining some kind of savings club?'
        '#options':
          2: 'Yes'
          4: Maybe
          3: 'No'
        '#required': true
        '#data_type': String
        '#civicrm_condition':
          andor: or
          action: visible
          rules:
            contact_contact_sub_type:
              values:
                - Canvass_Contact
        '#nid': canvass_form
        '#form_key': civicrm_1_contact_1_cg33_custom_111
        '#parent': civicrm_1_contact_1_cg33_fieldset
        '#default_option': ''
        '#default_value': ''
        '#civicrm_live_options': '1'
      civicrm_1_contact_1_cg33_custom_97:
        '#type': civicrm_options
        '#title': 'Preferred type of savings club'
        '#options':
          1: 'Rotating Fund'
          2: 'Community Purchase'
          3: 'Solidarity Fund (large group)'
          4: 'Solidarity Fund (close knit group)'
          5: Other
        '#states':
          visible:
            - ':input[name="civicrm_1_contact_1_cg33_custom_111"]':
                value: '2'
            - or
            - ':input[name="civicrm_1_contact_1_cg33_custom_111"]':
